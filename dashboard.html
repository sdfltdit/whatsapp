<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDF Inbox</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #181818; --surface3: #1e1e1e;
  --border: #222; --border2: #2e2e2e; --text: #efefef; --text2: #888; --text3: #444;
  --accent: #22c55e; --accent-dim: #16a34a; --accent-bg: #0d1f12;
  --warn: #f59e0b; --warn-bg: #1c1500; --danger: #ef4444; --danger-bg: #1c0808;
  --blue: #3b82f6; --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sidebar-w: 280px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; overflow: hidden; }
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.6rem; }
.logo-sm { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: var(--surface2); border: 1px solid var(--border2); }
.sidebar-title { font-size: 0.88rem; font-weight: 600; }
.sidebar-sub { font-size: 0.7rem; color: var(--text3); margin-top: 1px; }
.sidebar-user { margin-left: auto; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; color: var(--text2); cursor: pointer; }

.search-wrap { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
.search-input { width: 100%; padding: 0.45rem 0.7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.8rem; font-family: var(--font); outline: none; }
.search-input::placeholder { color: var(--text3); }

.conv-list { flex: 1; overflow-y: auto; }
.conv-list::-webkit-scrollbar { width: 4px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.conv-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; gap: 0.6rem; align-items: flex-start; }
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface3); border-left: 2px solid var(--accent); }
.conv-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; color: var(--text2); flex-shrink: 0; border: 1px solid var(--border2); }
.conv-info { flex: 1; min-width: 0; }
.conv-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.conv-name { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-time { font-size: 0.68rem; color: var(--text3); flex-shrink: 0; margin-left: 0.3rem; }
.conv-preview { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Chat area */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }
.chat-header { padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; background: var(--surface); }
.chat-header-info { flex: 1; }
.chat-header-name { font-size: 0.92rem; font-weight: 600; }
.chat-header-sub { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
.header-actions { display: flex; gap: 0.4rem; }
.hbtn { padding: 0.35rem 0.65rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-size: 0.72rem; cursor: pointer; transition: all 0.15s; }
.hbtn:hover { background: var(--surface3); color: var(--text); }
.hbtn.resolve { color: var(--accent); border-color: var(--accent-dim); }
.hbtn.resolve:hover { background: var(--accent-bg); }

.messages-wrap { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg-row { display: flex; gap: 0.5rem; align-items: flex-end; max-width: 75%; }
.msg-row.inbound { align-self: flex-start; }
.msg-row.outbound { align-self: flex-end; flex-direction: row-reverse; }
.bubble { padding: 0.55rem 0.85rem; border-radius: 12px; font-size: 0.85rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
.inbound .bubble { background: var(--surface); border: 1px solid var(--border2); border-bottom-left-radius: 3px; }
.outbound .bubble { background: var(--accent-bg); border: 1px solid var(--accent-dim); border-bottom-right-radius: 3px; color: var(--accent); }
.msg-time { font-size: 0.65rem; color: var(--text3); white-space: nowrap; padding-bottom: 4px; }
.msg-avatar-sm { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }

/* Reply bar */
.reply-bar { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 0.6rem; align-items: flex-end; }
.reply-input { flex: 1; padding: 0.6rem 0.85rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-size: 0.85rem; font-family: var(--font); outline: none; resize: none; min-height: 40px; max-height: 120px; line-height: 1.4; }
.reply-input::placeholder { color: var(--text3); }
.reply-input:focus { border-color: var(--accent-dim); }
.send-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--accent); border: none; color: #000; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
.send-btn:hover { background: var(--accent-dim); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Empty state */
.empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: 0.75rem; }
.empty-chat svg { opacity: 0.3; }
.empty-chat p { font-size: 0.85rem; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface3); border: 1px solid var(--border2); color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.8rem; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 0.85rem; }

@media (max-width: 640px) {
  .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 100; transition: left 0.2s; }
  .sidebar.open { left: 0; }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img class="logo-sm" src="https://sdfltd.com/sdf.jpg" alt="SDF" onerror="this.style.display='none'">
      <div>
        <div class="sidebar-title">SDF Inbox</div>
        <div class="sidebar-sub">WhatsApp conversations</div>
      </div>
      <div class="sidebar-user">
        <div class="avatar" id="user-avatar" onclick="signOut()" title="Sign out">?</div>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="search" placeholder="Search conversations…" oninput="filterConversations(this.value)">
    </div>
    <div class="conv-list" id="conv-list">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-chat" id="empty-chat">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>Select a conversation to start</p>
    </div>
    <div id="chat-main" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chat-header">
        <div class="conv-avatar" id="ch-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name">—</div>
          <div class="chat-header-sub" id="ch-sub">—</div>
        </div>
        <div class="header-actions">
          <button class="hbtn resolve" onclick="markResolved()">✓ Resolve</button>
        </div>
      </div>
      <div class="messages-wrap" id="messages"></div>
      <div class="reply-bar">
        <textarea class="reply-input" id="reply-input" placeholder="Type a reply…" rows="1" onkeydown="handleReplyKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendReply()">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qxlwlevbmyyhuooulfza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bHdsZXZibXl5aHVvb3VsZnphIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTk5ODc5MiwiZXhwIjoyMDk3NTc0NzkyfQ.o4CrI2hAtXZXgO9EVkWdv4NY9UPvI4jhA7f0ugQ9LaA';
const WA_TOKEN    = SUPABASE_KEY;
const PHONE_ID    = '1171658772697634';
const HEADERS     = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

let conversations = [];
let activeConvId  = null;
let pollTimer     = null;

// Auth check
const user = JSON.parse(sessionStorage.getItem('sdf_user') || 'null');
if (!user) window.location.href = 'index.html';
else document.getElementById('user-avatar').textContent = (user.full_name || user.email || 'U')[0].toUpperCase();

// Init
loadConversations();
setInterval(loadConversations, 10000);

async function loadConversations() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/wa_conversations?order=last_message_at.desc.nullslast&limit=100`, { headers: HEADERS });
    const data = await res.json();
    if (Array.isArray(data)) {
      conversations = data;
      renderConversations(conversations);
    }
  } catch(e) { showToast('Connection error'); }
}

function renderConversations(list) {
  const el = document.getElementById('conv-list');
  if (!list.length) { el.innerHTML = '<div class="loading">No conversations yet</div>'; return; }
  el.innerHTML = list.map(c => `
    <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConversation('${c.id}')">
      <div class="conv-avatar">${(c.contact_name || c.phone_number || '?')[0].toUpperCase()}</div>
      <div class="conv-info">
        <div class="conv-top">
          <div class="conv-name">${escHtml(c.contact_name || c.phone_number || 'Unknown')}</div>
          <div class="conv-time">${formatTime(c.last_message_at)}</div>
        </div>
        <div class="conv-preview">${escHtml(c.last_message || '—')}</div>
      </div>
    </div>`).join('');
}

function filterConversations(q) {
  const filtered = q ? conversations.filter(c =>
    (c.contact_name || '').toLowerCase().includes(q.toLowerCase()) ||
    (c.phone_number || '').includes(q) ||
    (c.last_message || '').toLowerCase().includes(q.toLowerCase())
  ) : conversations;
  renderConversations(filtered);
}

async function openConversation(id) {
  activeConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;

  document.getElementById('empty-chat').style.display = 'none';
  const chatMain = document.getElementById('chat-main');
  chatMain.style.display = 'flex';

  document.getElementById('ch-avatar').textContent = (conv.contact_name || conv.phone_number || '?')[0].toUpperCase();
  document.getElementById('ch-name').textContent = conv.contact_name || conv.phone_number || 'Unknown';
  document.getElementById('ch-sub').textContent = conv.phone_number || '';

  renderConversations(conversations);
  await loadMessages(id);

  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadMessages(id), 5000);
}

async function loadMessages(convId) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/wa_messages?conversation_id=eq.${convId}&order=id.asc&limit=200`, { headers: HEADERS });
    const data = await res.json();
    if (Array.isArray(data)) renderMessages(data);
  } catch(e) {}
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  if (!messages.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:0.8rem;padding:2rem">No messages yet</div>';
    return;
  }
  container.innerHTML = messages.map(m => `
    <div class="msg-row ${m.direction === 'inbound' ? 'inbound' : 'outbound'}">
      <div class="msg-avatar-sm">${m.direction === 'inbound' ? '👤' : '⚡'}</div>
      <div>
        <div class="bubble">${escHtml(m.content || '')}</div>
      </div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  const text  = input.value.trim();
  if (!text || !activeConvId) return;

  const conv = conversations.find(c => c.id === activeConvId);
  if (!conv?.phone_number) { showToast('No phone number found'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value  = '';
  autoResize(input);

  try {
    const waRes = await fetch(`https://graph.facebook.com/v19.0/${PHONE_ID}/messages`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${WA_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ messaging_product: 'whatsapp', to: conv.phone_number, type: 'text', text: { body: text } })
    });

    if (waRes.ok) {
      await fetch(`${SUPABASE_URL}/rest/v1/wa_messages`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ conversation_id: activeConvId, direction: 'outbound', content: text, message_type: 'text' })
      });
      await fetch(`${SUPABASE_URL}/rest/v1/wa_conversations?id=eq.${activeConvId}`, {
        method: 'PATCH',
        headers: HEADERS,
        body: JSON.stringify({ last_message: text, last_message_at: new Date().toISOString() })
      });
      showToast('Reply sent ✓');
      await loadMessages(activeConvId);
    } else {
      showToast('Failed to send — check token');
    }
  } catch(e) {
    showToast('Send error');
  } finally {
    btn.disabled = false;
  }
}

async function markResolved() {
  if (!activeConvId) return;
  await fetch(`${SUPABASE_URL}/rest/v1/wa_conversations?id=eq.${activeConvId}`, {
    method: 'PATCH', headers: HEADERS, body: JSON.stringify({ status: 'resolved' })
  });
  showToast('Marked as resolved ✓');
  await loadConversations();
}

function handleReplyKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function signOut() {
  sessionStorage.removeItem('sdf_user');
  window.location.href = 'index.html';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
